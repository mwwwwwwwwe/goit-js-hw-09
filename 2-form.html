<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <script type="module" crossorigin src="/goit-js-hw-09/2-form.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/styles-CRu2u_B2.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-BL40ySI3.css">
  </head>
  <body>
    <main class="main">
      <div class="container container--sm">
        <a class="back-link" href="./index.html">Go back</a>
        <h1 class="main-title">Form</h1>
      </div>
      
      <div class="container container--form">
        <form class="feedback-form" autocomplete="off">
          
          <div class="form-field">
            <label class="form-label" for="email">
              <span class="form-label-text">Email</span>
              <input 
                class="form-input" 
                type="email" 
                name="email" 
                id="email"
                autofocus 
                placeholder="Enter your email"
                required
              />
            </label>
          </div>

          <div class="form-field">
            <label class="form-label" for="message">
              <span class="form-label-text">Message</span>
              <textarea 
                class="form-textarea" 
                name="message" 
                id="message"
                rows="8" 
                placeholder="Enter your message"
                required
              ></textarea>
            </label>
          </div>

          <button class="form-button" type="submit">Submit</button>
          
        </form>
      </div>
    </main>
    
  </body>
</html>
